// ---------- State ----------
let projects = [];
let activeCat = 'HamńĪsńĪ';
let openId = null;
let editId = null;

function loadData(){
  try{
    projects = JSON.parse(localStorage.getItem(LS_DATA) || '[]');
  }catch(e){ projects = []; }
  const currentVersion = parseInt(localStorage.getItem(LS_VERSION) || '1', 10);
  const existingIds = new Set(projects.map(p=>p.id));
  if(currentVersion < 2){
    newEntriesV2().forEach(np=>{ if(!existingIds.has(np.id)){ projects.push(np); existingIds.add(np.id);} });
  }
  if(currentVersion < 3){
    newEntriesV3().forEach(np=>{ if(!existingIds.has(np.id)){ projects.push(np); existingIds.add(np.id);} });
  }
  if(currentVersion < 4){
    projects = applyV4Updates(projects);
  }
  if(currentVersion < VAULT_VERSION){
    localStorage.setItem(LS_VERSION, String(VAULT_VERSION));
    saveData();
  }
}
function saveData(){
  localStorage.setItem(LS_DATA, JSON.stringify(projects));
}

function categories(){
  const set = new Set(projects.map(p=>p.category || 'Dig…ôr'));
  return ['HamńĪsńĪ', ...Array.from(set)];
}

function renderToolbar(){
  const tb = document.getElementById('toolbar');
  tb.innerHTML = '';
  categories().forEach(cat=>{
    const c = document.createElement('div');
    c.className = 'chip' + (cat===activeCat ? ' active':'');
    c.textContent = cat;
    c.onclick = ()=>{ activeCat = cat; renderAll(); };
    tb.appendChild(c);
  });
}

function esc(s){ return (s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function fieldBlock(label, value, icon, isPassword){
  const empty = !value || !value.trim();
  return `<div class="field">
    <div class="field-label">${icon||''} ${label}</div>
    ${isPassword && !empty ? `
      <div class="pwbox">
        <div class="pwtext">${esc(value)}</div>
        <div class="mini copy-btn" data-copy="${esc(value)}">Kopyala</div>
      </div>` :
      `<div class="field-value ${empty?'empty':''}">${empty ? 'Yadda saxlanńĪlmayńĪb ‚ÄĒ d√ľz…ôlt d√ľym…ôsind…ôn …ôlav…ô et.' : esc(value)}</div>`
    }
  </div>`;
}

function cardHTML(p){
  const open = openId === p.id;
  const isEdit = editId === p.id;
  return `<div class="card ${open?'open':''}" data-id="${p.id}">
    <div class="card-top" data-toggle="${p.id}">
      <div>
        <div class="card-name">${esc(p.name)}</div>
        ${p.url ? `<div class="card-url">${esc(p.url)}</div>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="badge ${p.type==='firebase'?'firebase':'local'}">${p.type==='firebase'?'Firebase':'Local'}</span>
        <span class="chev">‚Ėĺ</span>
      </div>
    </div>
    <div class="card-desc">${esc(p.desc||'')}</div>
    <div class="detail">
      ${isEdit ? editFormHTML(p) : `
        ${fieldBlock('Admin panel…ô giriŇü', p.adminAccess, 'ūüĒĎ')}
        ${fieldBlock('Admin parol / PIN', p.adminPassword, 'ūüõ°ÔłŹ', true)}
        ${fieldBlock('Qeydiyyat nec…ô aparńĪlńĪr', p.registration, 'ūüďč')}
        ${fieldBlock('Firebase', p.firebase, 'ūüĒ•')}
        ${fieldBlock('Qeydl…ôr', p.notes, 'ūüďĚ')}
        <div class="edit-actions">
          <div class="mini" data-edit="${p.id}">‚úŹÔłŹ D√ľz…ôlt</div>
          ${p.url ? `<div class="mini" data-open="${esc(p.url)}">‚Üó Sayta ke√ß</div>` : ''}
          <div class="mini" data-del="${p.id}" style="color:#ff8b8b;">ūüóĎ</div>
        </div>
      `}
    </div>
  </div>`;
}

function editFormHTML(p){
  return `<div class="edit-row">
    <input data-f="name" placeholder="Layih…ô adńĪ" value="${esc(p.name)}">
    <input data-f="url" placeholder="URL (https://...)" value="${esc(p.url)}">
    <input data-f="category" placeholder="Kateqoriya (Klinika / Biznes / T…ôhsil...)" value="${esc(p.category)}">
    <textarea data-f="desc" placeholder="QńĪsa izah" rows="2">${esc(p.desc)}</textarea>
    <textarea data-f="adminAccess" placeholder="Admin panel…ô nec…ô girilir" rows="2">${esc(p.adminAccess)}</textarea>
    <textarea data-f="adminPassword" placeholder="Admin parol / PIN" rows="2">${esc(p.adminPassword)}</textarea>

    <div class="edit-actions">
      <div class="mini" data-save="${p.id}" style="background:rgba(42,157,143,.15);color:var(--teal);border-color:rgba(42,157,143,.4);">‚úď Yadda saxla</div>
      <div class="mini" data-canceledit="${p.id}">ńįmtina</div>
    </div>
  </div>`;
}

function renderGrid(){
  const grid = document.getElementById('grid');
  const list = projects.filter(p => activeCat==='HamńĪsńĪ' || (p.category||'Dig…ôr')===activeCat);
  grid.innerHTML = list.map(cardHTML).join('') || `<div style="text-align:center;color:var(--ink-dim);padding:40px 0;">Bu kateqoriyada layih…ô yoxdur.</div>`;

  grid.querySelectorAll('[data-toggle]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.getAttribute('data-toggle');
      if(editId === id) return;
      openId = openId === id ? null : id;
      renderGrid();
    });
  });
  grid.querySelectorAll('[data-edit]').forEach(el=>{
    el.addEventListener('click',(e)=>{ e.stopPropagation(); editId = el.getAttribute('data-edit'); openId = editId; renderGrid(); });
  });
  grid.querySelectorAll('[data-canceledit]').forEach(el=>{
    el.addEventListener('click',(e)=>{ e.stopPropagation(); editId = null; renderGrid(); });
  });
  grid.querySelectorAll('[data-save]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const id = el.getAttribute('data-save');
      const card = el.closest('.card');
      const p = projects.find(x=>x.id===id);
      card.querySelectorAll('[data-f]').forEach(inp=>{
        p[inp.getAttribute('data-f')] = inp.value;
      });
      saveData();
      editId = null;
      renderAll();
      showToast('Yadda saxlanńĪldńĪ ‚úď');
    });
  });
  grid.querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const id = el.getAttribute('data-del');
      if(confirm('Bu layih…ôni seyfd…ôn silm…ôk ist…ôyirs…ôn?')){
        projects = projects.filter(x=>x.id!==id);
        saveData(); renderAll();
        showToast('Silindi');
      }
    });
  });
  grid.querySelectorAll('[data-open]').forEach(el=>{
    el.addEventListener('click',(e)=>{ e.stopPropagation(); window.open(el.getAttribute('data-open'),'_blank'); });
  });
  grid.querySelectorAll('.copy-btn').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const text = el.getAttribute('data-copy');
      navigator.clipboard.writeText(text).then(()=>showToast('KopyalandńĪ ‚úď'));
    });
  });

  // 3D tilt on hover/touch for cards (matches your established micro-interaction pattern)
  grid.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('mousemove', e=>{
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left)/r.width - 0.5;
      const y = (e.clientY - r.top)/r.height - 0.5;
      card.style.transform = `perspective(600px) rotateY(${x*4}deg) rotateX(${-y*4}deg)`;
    });
    card.addEventListener('mouseleave', ()=>{ card.style.transform=''; });
  });
}

function renderAll(){
  loadData();
  document.getElementById('countLabel').textContent = projects.length + ' layih…ô yaddaŇüda saxlanńĪlńĪr';
  renderToolbar();
  renderGrid();
}

// ---------- Toast ----------
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ---------- Simple parallax on scroll ----------
window.addEventListener('scroll', ()=>{
  const y = window.scrollY;
  document.querySelectorAll('.orb').forEach((o,i)=>{
    o.style.transform = `translateY(${y * (0.03 + i*0.02)}px)`;
  });
});

    navigator.serviceWorker.register('sw.js').catch(()=>{});

}
